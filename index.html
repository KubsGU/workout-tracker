<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0b0f17" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Mój Trening</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  :root {
    --bg:#0b0f17; --bg-card:#151b27; --bg-card-2:#1c2433; --line:#283142; --text:#f2f5fa;
    --muted:#8b96a8; --accent:#3b82f6; --accent-2:#f59e0b; --good:#10b981; --danger:#ef4444;
    --radius:16px; --safe-b:env(safe-area-inset-bottom,0px); --safe-t:env(safe-area-inset-top,0px);
    --spring:cubic-bezier(0.32,0.72,0,1); --ease-out:cubic-bezier(0.22,1,0.36,1);
  }
  * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { margin:0; padding:0; background:var(--bg); color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,system-ui,sans-serif; overscroll-behavior-y:none; }
  body { min-height:100dvh; }
  a { color:var(--accent); }
  button { font-family:inherit; cursor:pointer; }
  .app { max-width:560px; margin:0 auto; min-height:100dvh; display:flex; flex-direction:column; }

  .topbar { position:sticky; top:0; z-index:20; background:rgba(11,15,23,.92); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line); padding:calc(var(--safe-t) + 12px) 16px 12px; display:flex; align-items:center; gap:12px; }
  .topbar h1 { font-size:18px; margin:0; font-weight:700; letter-spacing:-.2px; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .iconbtn { background:var(--bg-card); border:1px solid var(--line); color:var(--text); width:40px; height:40px;
    border-radius:12px; font-size:18px; display:grid; place-items:center; flex:none; }
  .sync-dot { font-size:11px; color:var(--muted); display:flex; align-items:center; gap:5px; }
  .sync-dot b { width:8px; height:8px; border-radius:50%; background:var(--muted); display:inline-block; }
  .sync-dot.cloud b { background:var(--good); }

  .content { flex:1; padding:16px; padding-bottom:calc(96px + var(--safe-b)); }
  .section-label { font-size:12px; text-transform:uppercase; letter-spacing:.12em; color:var(--muted); margin:4px 0 12px; font-weight:600; }

  .segment { display:flex; background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:4px; gap:4px; margin-bottom:20px; }
  .segment button { flex:1; border:none; background:transparent; color:var(--muted); padding:12px; border-radius:10px; font-size:15px; font-weight:600; transition:color .2s ease; }
  .segment button.active { background:var(--accent); color:#fff; animation:popIn .3s var(--spring); }

  .wlist { display:flex; flex-direction:column; gap:12px; }
  .wcard { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:18px;
    display:flex; align-items:center; gap:16px; text-align:left; width:100%; color:var(--text); position:relative; overflow:hidden; }
  .wcard:active { background:var(--bg-card-2); }
  .wcard .bar { position:absolute; left:0; top:0; bottom:0; width:5px; }
  .wcard .wmeta { flex:1; min-width:0; }
  .wcard .wname { font-size:18px; font-weight:700; }
  .wcard .wfocus { font-size:13px; color:var(--muted); margin-top:3px; }
  .wcard .wlast { font-size:12px; color:var(--muted); margin-top:6px; }
  .wcard .chev { color:var(--muted); font-size:22px; }
  .hint { font-size:13px; color:var(--muted); line-height:1.5; margin-top:18px; background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:14px; }

  .progress { display:flex; gap:5px; margin-bottom:16px; }
  .progress span { flex:1; height:5px; border-radius:3px; background:var(--line); transition:background .35s var(--ease-out); }
  .progress span.done { background:var(--good); }
  .progress span.cur { background:var(--accent); }

  .ex-step { font-size:12px; color:var(--muted); font-weight:600; letter-spacing:.08em; text-transform:uppercase; margin-bottom:6px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .tag { font-size:10px; padding:2px 8px; border-radius:999px; font-weight:700; letter-spacing:.04em; }
  .tag.opt { background:rgba(245,158,11,.16); color:var(--accent-2); }
  .tag.grp { background:rgba(59,130,246,.16); color:var(--accent); }
  .tag.fin { background:rgba(239,68,68,.16); color:var(--danger); }
  .ex-name { font-size:24px; font-weight:800; line-height:1.15; letter-spacing:-.3px; }
  .ex-note { font-size:13px; color:var(--accent-2); margin-top:8px; line-height:1.4; }
  .ex-link { display:inline-flex; align-items:center; gap:6px; margin-top:12px; font-size:14px; font-weight:600; text-decoration:none; background:var(--bg-card); border:1px solid var(--line); padding:8px 14px; border-radius:999px; color:var(--text); }

  .stats { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; margin:18px 0; }
  .stat { background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .stat.full { grid-column:span 2; }
  .stat .k { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .stat .v { font-size:20px; font-weight:800; margin-top:3px; }
  .stat .v.sm { font-size:15px; font-weight:700; }

  .last-box { background:linear-gradient(180deg,rgba(16,185,129,.10),rgba(16,185,129,.02)); border:1px solid rgba(16,185,129,.35); border-radius:12px; padding:12px 14px; margin-bottom:18px; }
  .last-box .k { font-size:11px; color:var(--good); text-transform:uppercase; letter-spacing:.08em; font-weight:700; }
  .last-box .v { font-size:15px; margin-top:5px; font-weight:600; line-height:1.5; }

  .logger-title { font-size:13px; color:var(--muted); font-weight:600; margin:6px 0 10px; text-transform:uppercase; letter-spacing:.08em; }
  .setrow { display:grid; grid-template-columns:34px 1fr 1fr auto; gap:8px; align-items:center; margin-bottom:10px; }
  .setrow .sn { width:34px; height:44px; display:grid; place-items:center; background:var(--bg-card); border:1px solid var(--line); border-radius:10px; font-weight:800; color:var(--muted); font-size:14px; }
  .setrow input { width:100%; height:52px; background:var(--bg-card-2); border:1px solid var(--line); border-radius:12px; color:var(--text); font-size:19px; font-weight:700; text-align:center; }
  .setrow input:focus { outline:none; border-color:var(--accent); }
  .setrow .unit { position:relative; }
  .setrow .unit::after { content:attr(data-u); position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:11px; color:var(--muted); pointer-events:none; }
  .setrow .del { background:transparent; border:none; color:var(--muted); font-size:22px; width:32px; }
  .addset { width:100%; background:var(--bg-card); border:1px dashed var(--line); color:var(--muted); padding:12px; border-radius:12px; font-size:14px; font-weight:600; margin-top:2px; }
  .saved-flash { color:var(--good); font-size:13px; font-weight:600; text-align:center; margin-top:10px; min-height:18px; }
  .saved-flash:not(:empty) { animation:flashPop .32s var(--spring); }

  .navbar { position:fixed; left:0; right:0; bottom:0; z-index:30; }
  .navbar-inner { max-width:560px; margin:0 auto; display:flex; gap:10px; padding:12px 16px; padding-bottom:calc(12px + var(--safe-b)); background:rgba(11,15,23,.95); backdrop-filter:blur(10px); border-top:1px solid var(--line); }
  .navbar button { flex:1; height:54px; border-radius:14px; font-size:16px; font-weight:700; border:1px solid var(--line); background:var(--bg-card); color:var(--text); }
  .navbar button.primary { background:var(--accent); border-color:var(--accent); color:#fff; flex:1.6; }
  .navbar button.rest { background:var(--bg-card); color:var(--accent-2); flex:.9; }
  .navbar button:disabled { opacity:.4; }

  .overlay { position:fixed; inset:0; z-index:50; background:rgba(8,11,18,.96); display:none; flex-direction:column; align-items:center; justify-content:center; gap:8px; padding:24px; }
  .overlay.show { display:flex; animation:fadeIn .25s var(--ease-out); }
  .overlay.show .timer-ring, .overlay.show .timer-label, .overlay.show .timer-actions { animation:riseIn .4s var(--spring) both; }
  .overlay.show .timer-label { animation-delay:.02s; }
  .overlay.show .timer-actions { animation-delay:.12s; }
  .timer-label { color:var(--muted); font-size:14px; letter-spacing:.1em; text-transform:uppercase; }
  .timer-ring { margin:8px 0 20px; }
  .timer-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
  .timer-actions button { background:var(--bg-card); border:1px solid var(--line); color:var(--text); padding:14px 20px; border-radius:14px; font-size:16px; font-weight:700; }
  .timer-actions button.stop { background:var(--danger); border-color:var(--danger); color:#fff; }

  .prehab { background:var(--bg-card); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin-bottom:16px; }
  .prehab h3 { margin:0 0 6px; font-size:13px; color:var(--accent-2); text-transform:uppercase; letter-spacing:.08em; }
  .prehab .pi { font-size:14px; padding:7px 0; border-top:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; }
  .prehab .pi:first-of-type { border-top:none; }
  .prehab .pi .pr { color:var(--muted); white-space:nowrap; font-weight:600; }
  .prehab .pi a { text-decoration:none; }

  .sheet { position:fixed; inset:0; z-index:60; background:rgba(8,11,18,.6); display:none; }
  .sheet.show { display:block; animation:fadeIn .2s ease; }
  .sheet.show .sheet-inner { animation:sheetUp .4s var(--spring); }
  .sheet-inner { position:absolute; left:0; right:0; bottom:0; max-width:560px; margin:0 auto; background:var(--bg-card); border-radius:20px 20px 0 0; border:1px solid var(--line); max-height:80dvh; display:flex; flex-direction:column; }
  .sheet-head { padding:18px 18px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--line); }
  .sheet-head h2 { margin:0; font-size:18px; }
  .sheet-body { overflow-y:auto; padding:12px 18px calc(20px + var(--safe-b)); }
  .hrow { padding:12px 0; border-bottom:1px solid var(--line); }
  .hrow .hd { font-size:12px; color:var(--muted); }
  .hrow .hs { font-size:15px; font-weight:600; margin-top:3px; }
  .empty { text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; }
  .circuit-note { background:rgba(239,68,68,.10); border:1px solid rgba(239,68,68,.3); border-radius:12px; padding:14px; font-size:14px; line-height:1.5; margin-bottom:16px; }

  /* Animacje */
  @keyframes viewFwd { from { opacity:0; transform:translateX(26px); } to { opacity:1; transform:translateX(0); } }
  @keyframes viewBack { from { opacity:0; transform:translateX(-26px); } to { opacity:1; transform:translateX(0); } }
  .content.anim-fwd { animation:viewFwd .34s var(--spring) both; }
  .content.anim-back { animation:viewBack .34s var(--spring) both; }
  @keyframes riseIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
  .stagger > * { animation:riseIn .42s var(--ease-out) both; }
  .stagger > *:nth-child(1){animation-delay:.02s}.stagger > *:nth-child(2){animation-delay:.06s}.stagger > *:nth-child(3){animation-delay:.10s}.stagger > *:nth-child(4){animation-delay:.14s}.stagger > *:nth-child(5){animation-delay:.18s}.stagger > *:nth-child(6){animation-delay:.22s}.stagger > *:nth-child(7){animation-delay:.26s}.stagger > *:nth-child(8){animation-delay:.30s}.stagger > *:nth-child(9){animation-delay:.34s}.stagger > *:nth-child(n+10){animation-delay:.38s}
  @keyframes popIn { 0% { transform:scale(.9); } 60% { transform:scale(1.04); } 100% { transform:scale(1); } }
  @keyframes flashPop { 0% { opacity:0; transform:translateY(6px) scale(.9); } 100% { opacity:1; transform:none; } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .wcard,.navbar button,.ex-link,.addset,.segment button,.iconbtn,.timer-actions button,.ov-item,.start-btn,.lock-btn { transition:transform .14s var(--spring), background .15s ease; }
  .wcard:active,.ov-item:active,.start-btn:active,.lock-btn:active { transform:scale(.975); }
  .navbar button:active,.ex-link:active,.addset:active,.iconbtn:active,.timer-actions button:active { transform:scale(.93); }

  /* Przegląd treningu */
  .ov-head { background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius); padding:18px; margin-bottom:18px; position:relative; overflow:hidden; }
  .ov-head .bar { position:absolute; left:0; top:0; bottom:0; width:5px; }
  .ov-head .t { font-size:22px; font-weight:800; }
  .ov-head .f { font-size:13px; color:var(--muted); margin-top:4px; }
  .ov-head .meta { font-size:12px; color:var(--muted); margin-top:10px; }
  .ov-list { display:flex; flex-direction:column; gap:10px; }
  .ov-item { width:100%; text-align:left; color:var(--text); background:var(--bg-card); border:1px solid var(--line); border-radius:14px; padding:14px; display:flex; align-items:center; gap:13px; }
  .ov-item:active { background:var(--bg-card-2); }
  .ov-num { flex:none; width:30px; height:30px; border-radius:9px; background:var(--bg-card-2); border:1px solid var(--line); display:grid; place-items:center; font-weight:800; font-size:13px; color:var(--muted); }
  .ov-item.done .ov-num { background:var(--good); border-color:var(--good); color:#fff; }
  .ov-mid { flex:1; min-width:0; }
  .ov-name { font-size:15px; font-weight:700; line-height:1.25; }
  .ov-sub { font-size:12px; color:var(--muted); margin-top:3px; display:flex; gap:8px; flex-wrap:wrap; }
  .ov-sub .chip { background:var(--bg-card-2); border:1px solid var(--line); border-radius:6px; padding:1px 7px; }
  .ov-tags { display:flex; gap:5px; margin-top:5px; }
  .ov-chev { color:var(--muted); font-size:20px; flex:none; }
  .ov-last { font-size:12px; color:var(--good); margin-top:4px; font-weight:600; }
  .start-btn { width:100%; height:56px; border:none; border-radius:16px; margin-top:4px; background:var(--accent); color:#fff; font-size:17px; font-weight:800; }

  /* Ekran blokady */
  .lock { min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:24px; }
  .lock-card { width:100%; max-width:360px; text-align:center; animation:riseIn .5s var(--spring) both; }
  .lock-logo { font-size:46px; margin-bottom:4px; }
  .lock-title { font-size:26px; font-weight:800; margin:0; letter-spacing:-.3px; }
  .lock-sub { color:var(--muted); font-size:14px; margin:6px 0 22px; }
  .lock-input { width:100%; height:56px; background:var(--bg-card-2); border:1px solid var(--line); border-radius:14px; color:var(--text); font-size:18px; text-align:center; }
  .lock-input:focus { outline:none; border-color:var(--accent); }
  .lock-remember { display:flex; align-items:center; gap:8px; justify-content:center; color:var(--muted); font-size:13px; margin:14px 0 18px; }
  .lock-remember input { width:18px; height:18px; accent-color:var(--accent); }
  .lock-btn { width:100%; height:54px; border:none; border-radius:14px; background:var(--accent); color:#fff; font-size:17px; font-weight:800; }
  .lock-msg { color:var(--danger); font-size:13px; font-weight:600; margin-top:14px; min-height:18px; line-height:1.4; }

  @media (prefers-reduced-motion: reduce) {
    * { animation-duration:.001ms !important; animation-delay:0s !important; transition-duration:.001ms !important; }
  }
</style>
</head>
<body>
  <div class="app" id="app"></div>

  <div class="overlay" id="overlay">
    <div class="timer-label">Przerwa</div>
    <svg class="timer-ring" width="180" height="180" viewBox="0 0 180 180">
      <circle cx="90" cy="90" r="80" fill="none" stroke="#283142" stroke-width="10"/>
      <circle id="ring" cx="90" cy="90" r="80" fill="none" stroke="#f59e0b" stroke-width="10" stroke-linecap="round" transform="rotate(-90 90 90)" stroke-dasharray="502.6" stroke-dashoffset="0"/>
      <text id="ringnum" x="90" y="90" text-anchor="middle" dominant-baseline="central" fill="#f2f5fa" font-size="46" font-weight="800">0</text>
    </svg>
    <div class="timer-actions">
      <button onclick="App.timerAdd(15)">+15 s</button>
      <button onclick="App.timerAdd(-15)">−15 s</button>
      <button class="stop" onclick="App.timerStop()">Zakończ</button>
    </div>
  </div>

  <div class="sheet" id="sheet" onclick="if(event.target===this)App.closeHistory()">
    <div class="sheet-inner">
      <div class="sheet-head"><h2 id="sheet-title">Historia</h2><button class="iconbtn" onclick="App.closeHistory()">✕</button></div>
      <div class="sheet-body" id="sheet-body"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="store.js"></script>
  <script src="app.js"></script>
</body>
</html>
